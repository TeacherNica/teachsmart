<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Upload Test</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; }
  input[type="file"] { display: block; margin: 10px 0; padding: 10px; border: 2px dashed #A855F7; border-radius: 8px; width: 100%; box-sizing: border-box; }
  button { padding: 12px 24px; background: #A855F7; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 10px; }
  #file-list { margin-top: 24px; }
  .file-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #F5F3FF; border-radius: 8px; margin-bottom: 8px; }
  .file-item a { color: #A855F7; font-weight: 600; text-decoration: none; }
  .del-btn { background: #FEE2E2; color: #EF4444; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  #msg { margin-top: 12px; color: #22C55E; font-weight: 600; display: none; }
</style>
</head>
<body>

<h2>📄 PDF Upload Test</h2>

<input type="file" id="pdf-input" accept="application/pdf" multiple>
<button onclick="uploadFiles()">💾 Save to Storage</button>
<div id="msg">✅ Files saved!</div>

<div id="file-list"></div>

<script>
  // Load existing files on page load
  window.onload = function() { renderFiles(); };

  function getFiles() {
    return JSON.parse(localStorage.getItem('test-pdfs') || '[]');
  }

  function saveFiles(files) {
    localStorage.setItem('test-pdfs', JSON.stringify(files));
  }

  function uploadFiles() {
    var input = document.getElementById('pdf-input');
    var files = input.files;
    if (!files || files.length === 0) {
      alert('Please select a PDF file first.');
      return;
    }

    var existing = getFiles();
    var loaded = 0;

    Array.from(files).forEach(function(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        existing.push({
          id: Date.now() + Math.random(),
          name: file.name,
          data: e.target.result,
          savedAt: new Date().toLocaleString()
        });
        loaded++;
        if (loaded === files.length) {
          saveFiles(existing);
          input.value = '';
          var msg = document.getElementById('msg');
          msg.style.display = 'block';
          setTimeout(function(){ msg.style.display = 'none'; }, 3000);
          renderFiles();
        }
      };
      reader.readAsDataURL(file);
    });
  }

  function renderFiles() {
    var files = getFiles();
    var list = document.getElementById('file-list');
    if (files.length === 0) {
      list.innerHTML = '<p style="color:#9CA3AF;">No files saved yet.</p>';
      return;
    }
    list.innerHTML = '<h3>Saved Files (' + files.length + ')</h3>' +
      files.map(function(f) {
        return '<div class="file-item">' +
          '<div>' +
            '<a href="' + f.data + '" target="_blank">📄 ' + f.name + '</a>' +
            '<div style="font-size:0.75rem;color:#9CA3AF;">' + f.savedAt + '</div>' +
          '</div>' +
          '<button class="del-btn" onclick="deleteFile(' + f.id + ')">Delete</button>' +
        '</div>';
      }).join('');
  }

  function deleteFile(id) {
    if (!confirm('Delete this file?')) return;
    var files = getFiles().filter(function(f) { return f.id !== id; });
    saveFiles(files);
    renderFiles();
  }
</script>

</body>
</html>
