<!DOCTYPE html>
<html>

<head>
  <title>TeachSmart</title>

  <style>
    body {
      background-color: #F0F4FF;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h1 {
      color: #A855F7;
      font-size: 36px;
    }

    h2 {
      color: #3B82F6;
      font-size: 24px;
    }

    p {
      color: #6B7280;
      font-size: 16px;
    }

    .card {
      background-color: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 16px;
      width: 300px;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
      color: #1E1B4B;
    }

    .detail {
      font-size: 14px;
      color: #6B7280;
    }

  </style>

</head>

<body>

  <h1>TeachSmart 📚</h1>
  <h2>My Students</h2>

  <div class="card">
    <p class="name">👧 Li Wei 🇨🇳</p>
    <p class="detail">Level: Intermediate</p>
    <p class="detail">Classes left: 8</p>
  </div>

  <div class="card">
    <p class="name">👦 Park Jisoo 🇰🇷</p>
    <p class="detail">Level: Beginner</p>
    <p class="detail">Classes left: 5</p>
  </div>

  <div class="card">
    <p class="name">👧 Chen Xiaoming 🇨🇳</p>
    <p class="detail">Level: Advanced</p>
    <p class="detail">Classes left: 12</p>
  </div>

</body>

</html>
